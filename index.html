<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Reporte de Seguridad del Paciente</title>
    <style>
        :root { 
            --primary: #0056b3; 
            --secondary: #00a8cc; 
            --accent: #27ae60; 
            --bg: #ebf2f7; 
            --text: #2c3e50;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            padding: 10px; 
            color: var(--text); 
            margin: 0; 
        }

        .container { 
            max-width: 650px; 
            margin: 20px auto; 
            background: white; 
            padding: 0; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            overflow: hidden; 
        }

        .header-banner {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 35px 20px;
            text-align: center;
        }

        .header-banner h1 { margin: 0; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 1px; }
        .header-banner p { margin: 10px 0 0; font-size: 0.9rem; opacity: 0.9; line-height: 1.4; }

        section { 
            padding: 30px 25px;
            border-bottom: 8px solid var(--bg); 
        }

        section:last-of-type { border-bottom: none; }

        h2 { 
            font-size: 1.1rem; 
            color: var(--primary); 
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid var(--secondary);
            padding-left: 10px;
        }

        label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 0.95rem; color: #444; }
        
        input[type="text"], input[type="date"], input[type="time"], select, textarea { 
            width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; 
            font-size: 1rem; transition: all 0.3s; background: #fafafa; box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus { 
            border-color: var(--secondary); outline: none; background: white; box-shadow: 0 0 8px rgba(0,168,204,0.2);
        }

        .radio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        
        /* Ajuste para móviles: una sola columna si la pantalla es pequeña */
        @media (max-width: 480px) { .radio-grid { grid-template-columns: 1fr; } }

        .item-card { 
            display: flex; align-items: center; gap: 10px; cursor: pointer; 
            background: white; border: 2px solid #eee; padding: 12px; border-radius: 12px; 
            transition: 0.2s; font-size: 0.9rem;
        }

        .item-card:hover { border-color: var(--secondary); background: #f0faff; }

        input[type="radio"], input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }

        .btn-submit { 
            width: calc(100% - 50px); margin: 10px 25px 40px 25px; padding: 20px; 
            background: linear-gradient(to right, #27ae60, #2ecc71);
            color: white; border: none; border-radius: 15px; 
            font-weight: bold; cursor: pointer; font-size: 1.2rem; 
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3); transition: 0.3s;
        }

        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(39, 174, 96, 0.4); }

        .other-field { display: none; margin-top: 12px; border-left: 4px solid var(--secondary); background: #fffbe6; }
        
        textarea { min-height: 110px; resize: vertical; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-banner">
        <h1>Seguridad del Paciente</h1>
        <p>Tu reporte es confidencial y ayuda a mejorar la atención y seguridad en nuestro centro de salud.</p>
    </div>

    <form action="https://api.web3forms.com/submit" method="POST">
        
        <input type="hidden" name="access_key" value="e63fa5f7-de53-45dc-bef7-3f193f62a6c0">
        <input type="hidden" name="from_name" value="Centro de Salud - Reportes">
        <input type="hidden" name="subject" value="Nuevo Reporte de Seguridad Recibido">

        <section>
            <h2>Información General</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Fecha del evento</label>
                    <input type="date" name="fecha_evento" required>
                </div>
                <div class="form-group">
                    <label>Hora aproximada</label>
                    <input type="time" name="hora_evento" required>
                </div>
            </div>
            <div class="form-group" style="margin-top: 20px;">
                <label>Área o servicio donde ocurrió</label>
                <select name="area_servicio" onchange="checkOther(this, 'extra-area')" required>
                    <option value="">Seleccione el área...</option>
                    <option>Consulta externa</option>
                    <option>Hospitalización</option>
                    <option>Urgencias</option>
                    <option>Farmacia</option>
                    <option>Laboratorio</option>
                    <option>Quirófano</option>
                    <option value="Otro">Otro...</option>
                </select>
                <input type="text" id="extra-area" name="area_especificada" class="other-field" placeholder="Especifique el área">
            </div>
        </section>

        <section>
            <h2>Tipo de Evento</h2>
            <div class="radio-grid">
                <label class="item-card"><input type="radio" name="tipo_evento" value="Evento adverso" required> Evento adverso</label>
                <label class="item-card"><input type="radio" name="tipo_evento" value="Evento centinela"> Evento centinela</label>
                <label class="item-card"><input type="radio" name="tipo_evento" value="Cuasifalla"> Cuasifalla</label>
            </div>
        </section>

        <section>
            <h2>Descripción del Suceso</h2>
            <div class="form-group">
                <label>Describa detalladamente lo sucedido 📝</label>
                <textarea name="descripcion_hechos" required placeholder="¿Qué pasó? ¿Cómo pasó?"></textarea>
            </div>
        </section>

        <section>
            <h2>Personas Involucradas</h2>
            <div class="radio-grid">
                <label class="item-card"><input type="checkbox" name="involucrados[]" value="Paciente"> Paciente</label>
                <label class="item-card"><input type="checkbox" name="involucrados[]" value="Familiar"> Familiar</label>
                <label class="item-card"><input type="checkbox" name="involucrados[]" value="Personal médico"> Personal médico</label>
                <label class="item-card"><input type="checkbox" name="involucrados[]" value="Enfermería"> Enfermería</label>
                <label class="item-card"><input type="checkbox" name="involucrados[]" value="Administrativo"> Administrativo</label>
                <label class="item-card"><input type="checkbox" name="involucrados[]" value="Otro" onclick="checkOtherCheck(this, 'extra-pers')"> Otro</label>
            </div>
            <input type="text" id="extra-pers" name="persona_especificada" class="other-field" placeholder="Especifique quién">
        </section>

        <section>
            <h2>Consecuencias y Acciones</h2>
            <div class="form-group">
                <label>¿Hubo daño al paciente?</label>
                <div class="radio-grid">
                    <label class="item-card"><input type="radio" name="hubo_dano" value="Si"> Sí</label>
                    <label class="item-card"><input type="radio" name="hubo_dano" value="No"> No</label>
                    <label class="item-card"><input type="radio" name="hubo_dano" value="Desconoce"> Desconoce</label>
                </div>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Describa el daño o consecuencia (si aplica)</label>
                <textarea name="descripcion_dano"></textarea>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>Acciones realizadas en el momento</label>
                <textarea name="acciones_tomadas"></textarea>
            </div>
        </section>

        <section>
            <h2>Datos del Reportante (Opcional)</h2>
            <div class="form-group">
                <input type="text" name="nombre_opcional" placeholder="Su nombre completo" style="margin-bottom: 15px;">
                <input type="text" name="puesto_opcional" placeholder="Su puesto o área de trabajo">
            </div>
        </section>

        <button type="submit" class="btn-submit">✅ ENVIAR REPORTE</button>
    </form>
</div>

<script>
    function checkOther(select, targetId) {
        document.getElementById(targetId).style.display = (select.value === 'Otro') ? 'block' : 'none';
    }
    function checkOtherCheck(checkbox, targetId) {
        document.getElementById(targetId).style.display = (checkbox.checked) ? 'block' : 'none';
    }
</script>

</body>
</html>
